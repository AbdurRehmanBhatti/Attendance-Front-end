name: attendance_app
description: "Attendance tracking app with clock-in/out and history."
publish_to: 'none'
version: 1.0.4+7

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  intl: ^0.18.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_secure_storage: ^9.2.2
  app_links: ^6.4.0
  introduction_screen: ^3.1.14
  tutorial_coach_mark: ^1.2.11
  shared_preferences: ^2.2.3
  geolocator: ^13.0.2
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0
  in_app_update: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app-icons/app_icon_maskfit_tight.png
  adaptive_icon_foreground: assets/app-icons/app_icon_maskfit_tight.png
  adaptive_icon_background: assets/app-icons/app_icon_maskfit_tight.png
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true
  min_sdk_android: 21
